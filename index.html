<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZeroPhone</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fcfbf8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 统一高奢宋体 */
        body { font-family: 'SimSun', 'Songti SC', 'STSong', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; }
        /* 极简下拉框 */
        select { 
            appearance: none; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='1.5' stroke-linecap='square' stroke-linejoin='miter'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); 
            background-repeat: no-repeat; background-position: right 0 center; background-size: 1.2em; 
        }
        input:focus, select:focus, textarea:focus { outline: none; }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen flex items-center justify-center font-sans overflow-hidden m-0 p-0 relative">
    
    <!-- 📱 手机全局外壳 -->
    <div class="w-full h-[100dvh] max-w-[430px] sm:w-[390px] sm:h-[844px] bg-black sm:rounded-[3rem] shadow-2xl relative overflow-hidden box-border">

        <!-- ========================================================= -->
        <!-- 🏠 第一层：主屏幕 (Home Screen) -->
        <!-- ========================================================= -->
        <div id="screen-home" class="absolute inset-0 bg-zinc-50 flex flex-col p-6 transition-transform duration-[400ms] ease-[cubic-bezier(0.32,0.72,0,1)] w-full h-full z-10 translate-x-0">
            
            <!-- 顶部组件 -->
            <div class="bg-white border border-zinc-200 rounded-[24px] p-5 grid grid-cols-2 gap-5 shadow-sm min-h-[180px] box-border w-full">
                <div class="flex flex-col h-full min-w-0 justify-between">
                    <div>
                        <input id="app-title" onchange="saveText('app-title')" value="ZeroPhone" class="text-base font-extrabold text-black bg-transparent w-full mb-0 truncate tracking-widest border-b border-transparent focus:border-zinc-300 transition-colors" />
                        <input id="app-subtitle" onchange="saveText('app-subtitle')" value="Your Personal AI Assistant" class="text-[9px] text-zinc-500 bg-transparent w-full mb-2 truncate border-b border-transparent focus:border-zinc-300 transition-colors" />
                    </div>
                    <div class="bg-zinc-50 border border-zinc-100 rounded-[12px] p-2 flex-1 flex flex-col justify-center min-h-0">
                        <div id="calendar-container" class="grid grid-cols-7 gap-y-[2px] w-full mt-0.5"></div>
                    </div>
                </div>
                <div class="flex flex-col h-full relative min-w-0 justify-between">
                    <div class="absolute -top-1 right-0 text-lg font-light text-black">24°C</div>
                    <textarea id="app-greeting" onchange="saveText('app-greeting')" class="mt-6 text-[10px] text-center text-zinc-600 bg-transparent resize-none no-scrollbar w-full leading-snug font-bold border-b border-transparent focus:border-zinc-300 transition-colors" rows="2">Good Morning!&#10;Ready to explore?</textarea>
                    <div class="flex flex-col gap-1.5 w-full">
                        <div class="bg-zinc-50 border border-zinc-100 rounded-[10px] py-1.5 px-2 flex flex-col items-center justify-center text-[9px] font-bold text-black text-center w-full leading-tight min-h-[38px]"><span>Today is Wednesday,</span><span>March 18, 2026</span></div>
                        <div class="bg-zinc-50 border border-zinc-100 rounded-[10px] py-1.5 px-2 flex items-center justify-center text-[9.5px] font-bold text-black text-center w-full leading-tight min-h-[38px]">The sun will set at 3:34 PM</div>
                    </div>
                </div>
            </div>

            <!-- 中间组件 (拍立得 + 图标) -->
            <div class="mt-10 flex gap-4 h-40 relative">
                <div class="w-1/2 relative flex items-center justify-center">
                    <input type="file" accept="image/*" id="fileInput1" class="hidden" onchange="handleFileUpload(event, 'photo1')" />
                    <input type="file" accept="image/*" id="fileInput2" class="hidden" onchange="handleFileUpload(event, 'photo2')" />
                    <div id="polaroid-1" onclick="swapPolaroids()" class="absolute bg-white p-2 pb-8 rounded-sm shadow-md transform -rotate-6 transition-all duration-300 hover:scale-105 cursor-pointer w-28 h-32 left-2 top-2 border border-zinc-200 z-0">
                        <img id="photo1" onclick="handlePhotoClick(event, 'photo1', 'fileInput1')" src="https://images.unsplash.com/photo-1707343843437-caacff5cfa74?q=80&w=200&auto=format&fit=crop" class="w-full h-full object-cover bg-zinc-100 hover:opacity-80 transition-opacity" alt="polaroid-1" />
                    </div>
                    <div id="polaroid-2" onclick="swapPolaroids()" class="absolute bg-white p-2 pb-8 rounded-sm shadow-lg transform rotate-6 transition-all duration-300 hover:scale-105 cursor-pointer w-28 h-32 right-2 top-6 border border-zinc-200 z-10">
                        <img id="photo2" onclick="handlePhotoClick(event, 'photo2', 'fileInput2')" src="https://images.unsplash.com/photo-1682687982501-1e58b814714c?q=80&w=200&auto=format&fit=crop" class="w-full h-full object-cover bg-zinc-100 hover:opacity-80 transition-opacity" alt="polaroid-2" />
                    </div>
                </div>
                <div class="w-1/2 grid grid-cols-2 grid-rows-2 gap-3">
                    <div class="flex flex-col items-center justify-center gap-1"><div class="w-12 h-12 bg-white border border-zinc-200 rounded-[14px] shadow-sm flex items-center justify-center text-black"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h3M11 21l5-10 5 10M12.751 15h4.498" /></svg></div><span class="text-[10px] font-bold text-zinc-600">Lingo</span></div>
                    <div class="flex flex-col items-center justify-center gap-1"><div class="w-12 h-12 bg-white border border-zinc-200 rounded-[14px] shadow-sm flex items-center justify-center text-black"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg></div><span class="text-[10px] font-bold text-zinc-600">World Book</span></div>
                    
                    <!-- ✨ 点击第3个图标 (API) 打开 API 杂志风界面 ✨ -->
                    <div onclick="openApp('screen-api')" class="flex flex-col items-center justify-center gap-1 cursor-pointer group">
                        <div class="w-12 h-12 bg-white border border-zinc-200 rounded-[14px] shadow-sm flex items-center justify-center text-black group-active:scale-90 transition-transform"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5" /></svg></div>
                        <span class="text-[10px] font-bold text-zinc-600">API</span>
                    </div>

                    <div class="flex flex-col items-center justify-center gap-1"><div class="w-12 h-12 bg-white border border-zinc-200 rounded-[14px] shadow-sm flex items-center justify-center text-black"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z" /></svg></div><span class="text-[10px] font-bold text-zinc-600">FaceMeet</span></div>
                </div>
            </div>

            <!-- Dock 栏 -->
            <div class="absolute bottom-8 left-6 right-6 h-[72px] bg-white/70 backdrop-blur-xl rounded-[2rem] flex items-center justify-between px-6 shadow-sm border border-white/50">
                <div class="w-12 h-12 bg-white rounded-[14px] shadow-sm flex items-center justify-center text-black border border-zinc-100"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg></div>
                <div class="w-12 h-12 bg-white rounded-[14px] shadow-sm flex items-center justify-center text-black border border-zinc-100"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></div>
                <div class="w-12 h-12 bg-white rounded-[14px] shadow-sm flex items-center justify-center text-black border border-zinc-100"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg></div>
                <div class="w-12 h-12 bg-white rounded-[14px] shadow-sm flex items-center justify-center text-black border border-zinc-100"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg></div>
            </div>
        </div>

        <!-- ========================================================= -->
        <!-- ⚙️ 第二层：API 设置 (Magazine Style) -->
        <!-- ========================================================= -->
        <!-- 带有左侧大阴影，平时藏在右边 -->
        <div id="screen-api" class="absolute inset-0 bg-[#fcfbf8] flex flex-col transition-transform duration-[400ms] ease-[cubic-bezier(0.32,0.72,0,1)] w-full h-full z-20 translate-x-full shadow-[-30px_0_50px_rgba(0,0,0,0.15)]">
            
            <div class="px-6 pt-14 pb-4 flex items-center justify-between border-b border-black z-10 relative">
                <!-- ✨ 点击返回，退出 API 屏幕 ✨ -->
                <div onclick="closeApp('screen-api')" class="flex items-center gap-1 cursor-pointer text-zinc-400 hover:text-black transition-colors active:opacity-50 w-16">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="square" stroke-linejoin="miter" d="M15 19l-7-7 7-7" /></svg>
                    <span class="text-xs font-bold mt-0.5 tracking-widest uppercase">Back</span>
                </div>
                <div onclick="saveGlobalAPI()" id="global-save-btn" class="w-16 text-right text-xs font-bold tracking-[0.2em] text-black cursor-pointer active:opacity-50 transition-all uppercase">Save</div>
            </div>

            <div class="flex-1 overflow-y-auto no-scrollbar p-8 flex flex-col pb-24">
                <div class="mb-10 mt-4">
                    <h1 class="text-4xl font-extrabold text-black tracking-widest leading-none mb-2">API<br/>CONFIG.</h1>
                    <p class="text-[9px] text-zinc-500 tracking-[0.3em] uppercase font-sans">Neural Network Bridging System</p>
                </div>

                <div class="border-t-2 border-black pt-6 pb-8 flex flex-col gap-6">
                    <div class="relative">
                        <label class="text-[9px] font-bold text-zinc-400 uppercase tracking-[0.2em] block mb-1">Base URL / 代理地址</label>
                        <input id="api-url" type="text" placeholder="https://api.openai.com" class="w-full bg-transparent border-b border-zinc-300 focus:border-black py-2 text-base text-black transition-colors placeholder-zinc-300 rounded-none" />
                    </div>
                    <div class="relative">
                        <label class="text-[9px] font-bold text-zinc-400 uppercase tracking-[0.2em] block mb-1">Secret Key / 密钥</label>
                        <input id="api-key" type="password" placeholder="sk-..." class="w-full bg-transparent border-b border-zinc-300 focus:border-black py-2 text-base text-black transition-colors placeholder-zinc-300 rounded-none tracking-widest" />
                    </div>
                    <button type="button" onclick="fetchModels()" class="mt-2 w-full bg-black text-white py-4 text-[10px] font-bold tracking-[0.3em] uppercase active:bg-zinc-800 transition-colors flex items-center justify-center gap-2 rounded-none">
                        Fetch Models / 拉取模型
                    </button>
                    <div id="fetch-status" class="text-center text-[10px] text-zinc-400 h-3 tracking-widest transition-colors italic">等待连接...</div>
                </div>

                <div class="border-t border-zinc-300 pt-6 pb-8">
                    <div class="relative">
                        <label class="text-[9px] font-bold text-zinc-400 uppercase tracking-[0.2em] block mb-1">Select Model / 选择模型</label>
                        <select id="model-select" class="w-full bg-transparent border-b border-zinc-300 focus:border-black py-2 text-base text-black transition-colors rounded-none cursor-pointer">
                            <option value="">请先拉取或手动输入</option>
                        </select>
                    </div>
                </div>

                <div class="border-t border-zinc-300 pt-6 flex flex-col gap-6">
                    <div class="flex items-center justify-between"><h2 class="text-sm font-extrabold text-black tracking-widest">SAVED PRESETS.</h2></div>
                    <button type="button" onclick="openPresetModal()" class="w-full bg-transparent border border-black text-black py-4 text-[10px] font-bold tracking-[0.2em] uppercase active:bg-zinc-100 transition-colors flex items-center justify-center gap-2 rounded-none">
                        Save as Preset / 存为预设
                    </button>
                    <div id="presets-list" class="flex flex-col gap-0 mt-2 border-b border-zinc-200"></div>
                </div>

                <div class="flex items-center justify-between mt-12 pt-4 border-t border-black">
                    <span class="text-[9px] font-bold text-zinc-400 tracking-[0.2em] uppercase">Current Status</span>
                    <div class="flex items-center gap-2 text-[10px] text-zinc-600">
                        <span id="global-status-dot" class="w-1.5 h-1.5 rounded-full bg-zinc-300"></span>
                        <span id="global-status-text" class="tracking-widest">无生效配置</span>
                    </div>
                </div>
            </div>

            <!-- 弹窗也放在这层里面 -->
            <div id="custom-modal" class="absolute inset-0 z-50 flex items-center justify-center bg-[#fcfbf8]/90 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300">
                <div id="custom-modal-card" class="bg-white p-8 w-[85%] max-w-[320px] shadow-[0_20px_40px_rgba(0,0,0,0.08)] transform scale-95 transition-transform duration-300 flex flex-col gap-6 border border-black mb-32 rounded-none">
                    <div class="text-center border-b border-zinc-200 pb-4">
                        <h3 class="text-lg font-extrabold text-black tracking-widest mb-1 uppercase">Name Preset</h3>
                        <p class="text-[9px] text-zinc-500 tracking-[0.1em] uppercase">给预设起个名字吧</p>
                    </div>
                    <input id="preset-name-input" type="text" placeholder="e.g. GPT-4 Pro" class="w-full bg-transparent border-b border-black py-3 text-center text-base text-black outline-none placeholder-zinc-300 rounded-none tracking-widest" />
                    <div class="flex flex-col gap-2 mt-2">
                        <button type="button" ontouchstart="forceSave(event)" onmousedown="forceSave(event)" id="modal-save-btn" class="w-full py-4 bg-black text-white text-[10px] font-bold tracking-[0.3em] uppercase active:bg-zinc-800 transition-colors rounded-none">
                            Confirm / 确认保存
                        </button>
                        <button type="button" onclick="closePresetModal()" class="w-full py-3 bg-transparent text-zinc-400 text-[10px] font-bold tracking-[0.2em] uppercase active:text-black transition-colors rounded-none">
                            Cancel / 取消
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- ========================================================= -->
    <!-- 🧠 大脑中枢：管理两层屏幕的所有逻辑 -->
    <!-- ========================================================= -->
    <script>
        // --- 0. 防崩溃沙盒缓存 ---
        const memoryStorage = {};
        function safeSet(key, value) { try { localStorage.setItem(key, value); } catch (e) { memoryStorage[key] = value; } }
        function safeGet(key) { try { return localStorage.getItem(key); } catch (e) { return memoryStorage[key] || null; } }

        // --- 1. 丝滑转场动画逻辑 ---
        function openApp(screenId) {
            document.getElementById('screen-home').style.transform = 'translateX(-20%) scale(0.95)';
            document.getElementById('screen-home').style.opacity = '0.5';
            document.getElementById(screenId).style.transform = 'translateX(0)';
        }
        function closeApp(screenId) {
            document.getElementById('screen-home').style.transform = 'translateX(0) scale(1)';
            document.getElementById('screen-home').style.opacity = '1';
            document.getElementById(screenId).style.transform = 'translateX(100%)';
        }

        // --- 2. 主页日历与拍立得逻辑 ---
        const cal = document.getElementById('calendar-container');
        let h = ''; ['S','M','T','W','T','F','S'].forEach(d => h+=`<div class="text-zinc-400 text-center text-[6px] font-bold mb-0.5">${d}</div>`);
        for(let i=1; i<=31; i++) { h+=`<div class="flex items-center justify-center h-full"><span class="${i===18?'bg-black text-white rounded-full w-[13px] h-[13px] shadow-sm':'text-zinc-600'} font-bold flex items-center justify-center text-[7px]">${i}</span></div>`; }
        cal.innerHTML = h;

        function saveText(id) { safeSet(id, document.getElementById(id).value); }

        function handlePhotoClick(e, img, inp) { e.stopPropagation(); const u = prompt("URL:"); if(u){ document.getElementById(img).src = u; safeSet(img, u);} else document.getElementById(inp).click(); }
        function handleFileUpload(e, img) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = e => { const i = new Image(); i.onload = () => { const c = document.createElement('canvas'); let w=i.width, h=i.height; if(w>600){h=Math.round(h*600/w);w=600;} c.width=w; c.height=h; c.getContext('2d').drawImage(i,0,0,w,h); const b=c.toDataURL('image/jpeg',0.8); document.getElementById(img).src=b; try{safeSet(img,b);}catch(err){} }; i.src = e.target.result; }; r.readAsDataURL(f); }
        function swapPolaroids() { const p1=document.getElementById('polaroid-1'), p2=document.getElementById('polaroid-2'); ['-rotate-6','rotate-6','left-2','right-2','top-2','top-6','z-0','z-10','shadow-md','shadow-lg'].forEach(c=>{p1.classList.toggle(c);p2.classList.toggle(c);}); }

        // --- 3. API 杂志风屏幕逻辑 ---
        const urlInput = document.getElementById('api-url');
        const keyInput = document.getElementById('api-key');
        const modelSelect = document.getElementById('model-select');
        const statusText = document.getElementById('fetch-status');
        const presetsList = document.getElementById('presets-list');
        const saveBtn = document.getElementById('global-save-btn');
        const modal = document.getElementById('custom-modal');
        const modalCard = document.getElementById('custom-modal-card');
        const nameInput = document.getElementById('preset-name-input');

        nameInput.addEventListener('keypress', function (e) { if (e.key === 'Enter') { e.preventDefault(); confirmSavePreset(); } });

        // 全局初始化：同时恢复主页和API的数据
        window.addEventListener('DOMContentLoaded', () => {
            // 恢复主页
            ['app-title', 'app-subtitle', 'app-greeting'].forEach(id => { const s = safeGet(id); if(s !== null) document.getElementById(id).value = s; });
            ['photo1', 'photo2'].forEach(id => { const s = safeGet(id); if(s) document.getElementById(id).src = s; });
            
            // 恢复API页
            const gUrl = safeGet('global_api_url'), gKey = safeGet('global_api_key'), gMod = safeGet('global_api_model');
            if(gUrl) urlInput.value = gUrl;
            if(gKey) keyInput.value = gKey;
            if(gMod) { modelSelect.innerHTML = `<option value="${gMod}">${gMod}</option>`; updateGlobalStatus(gMod); }
            renderPresets();
        });

        function saveGlobalAPI() {
            const url = urlInput.value.trim() || 'https://api.openai.com', key = keyInput.value.trim(), model = modelSelect.value;
            if(!key || !model) { saveBtn.innerText = 'ERROR'; saveBtn.classList.add('text-red-500'); setTimeout(() => { saveBtn.innerText = 'SAVE'; saveBtn.classList.remove('text-red-500'); }, 1500); return; }
            safeSet('global_api_url', url); safeSet('global_api_key', key); safeSet('global_api_model', model);
            updateGlobalStatus(model);
            saveBtn.innerText = 'SAVED'; saveBtn.classList.add('text-green-600'); setTimeout(() => { saveBtn.innerText = 'SAVE'; saveBtn.classList.remove('text-green-600'); }, 1500);
        }

        function updateGlobalStatus(modelName) {
            document.getElementById('global-status-text').innerText = modelName;
            document.getElementById('global-status-dot').classList.replace('bg-zinc-300', 'bg-black');
            document.getElementById('global-status-dot').classList.add('animate-pulse');
        }

        async function fetchModels() {
            let url = urlInput.value.trim() || "https://api.openai.com"; url = url.replace(/\/+$/, '');
            const key = keyInput.value.trim();
            if(!key) { showStatus('Missing Secret Key.', 'text-red-500'); return; }
            showStatus('Connecting...', 'text-zinc-400');
            try {
                const response = await fetch(`${url}/v1/models`, { method: 'GET', headers: { 'Authorization': `Bearer ${key}` } });
                if(!response.ok) throw new Error('Key无效');
                const data = await response.json();
                modelSelect.innerHTML = '';
                if(data.data && data.data.length > 0) {
                    data.data.forEach(m => { const opt = document.createElement('option'); opt.value = m.id; opt.textContent = m.id; modelSelect.appendChild(opt); });
                    showStatus(`${data.data.length} Models Fetched.`, 'text-black font-bold');
                } else throw new Error('无模型');
            } catch(err) {
                showStatus('Network blocked. Mock models loaded.', 'text-zinc-600');
                const mockModels = ['gpt-3.5-turbo', 'gpt-4', 'gpt-4o', 'claude-3-opus', 'gemini-1.5-pro', 'deepseek-chat'];
                modelSelect.innerHTML = ''; mockModels.forEach(m => { const opt = document.createElement('option'); opt.value = m; opt.textContent = m; modelSelect.appendChild(opt); });
            }
        }

        function showStatus(t, c) { statusText.innerText = t; statusText.className = `text-center text-[10px] h-3 tracking-widest transition-colors italic ${c}`; }

        function getPresets() { return JSON.parse(safeGet('api_presets') || '[]'); }

        function openPresetModal() {
            const key = keyInput.value.trim(), model = modelSelect.value;
            if(!key || !model) {
                const b = document.getElementById('create-preset-btn'), o = b.innerHTML;
                b.innerHTML = `⚠️ MISSING PARAMETERS`; b.classList.add('text-red-500', 'border-red-500');
                setTimeout(() => { b.innerHTML = o; b.classList.remove('text-red-500', 'border-red-500'); }, 2000); return;
            }
            nameInput.value = ''; modal.classList.remove('opacity-0', 'pointer-events-none'); modalCard.classList.remove('scale-95'); modalCard.classList.add('scale-100');
            setTimeout(() => nameInput.focus(), 100);
        }

        function closePresetModal() { nameInput.blur(); modal.classList.add('opacity-0', 'pointer-events-none'); modalCard.classList.remove('scale-100'); modalCard.classList.add('scale-95'); }

        function forceSave(e) { if(e) e.preventDefault(); confirmSavePreset(); }

        function confirmSavePreset() {
            const presetName = nameInput.value.trim();
            if(!presetName) { nameInput.classList.add('border-red-500', 'placeholder-red-300'); setTimeout(() => nameInput.classList.remove('border-red-500', 'placeholder-red-300'), 1000); return; }
            const btn = document.getElementById('modal-save-btn'); btn.innerText = 'SAVING...';
            setTimeout(() => {
                const url = urlInput.value.trim() || 'https://api.openai.com', key = keyInput.value.trim(), model = modelSelect.value;
                const newPreset = { id: Date.now().toString(), name: presetName, url: url, key: key, model: model };
                const presets = getPresets(); presets.push(newPreset);
                safeSet('api_presets', JSON.stringify(presets));
                renderPresets(); closePresetModal(); btn.innerText = 'Confirm / 确认保存';
            }, 50);
        }

        function loadPreset(id) {
            const presets = getPresets(), target = presets.find(p => p.id === id);
            if(target) { urlInput.value = target.url; keyInput.value = target.key; modelSelect.innerHTML = `<option value="${target.model}">${target.model}</option>`; showStatus('Preset loaded. Click SAVE above.', 'text-black font-bold'); }
        }

        function deletePreset(e, id) { e.stopPropagation(); let presets = getPresets(); presets = presets.filter(p => p.id !== id); safeSet('api_presets', JSON.stringify(presets)); renderPresets(); }

        function renderPresets() {
            const presets = getPresets(); presetsList.innerHTML = ''; 
            if(presets.length === 0) { presetsList.innerHTML = '<div class="text-[10px] text-zinc-400 text-center py-6 tracking-widest uppercase italic">Empty Presets.</div>'; return; }
            presets.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = "flex items-center justify-between py-4 cursor-pointer hover:bg-zinc-100 transition-colors active:opacity-50 border-t border-zinc-200 group";
                card.onclick = () => loadPreset(p.id);
                card.innerHTML = `<div class="flex flex-col gap-1 overflow-hidden"><span class="text-sm font-bold text-black truncate tracking-wider uppercase">0${i+1}. ${p.name}</span><span class="text-[10px] text-zinc-500 font-sans truncate">${p.model}</span></div><div onclick="deletePreset(event, '${p.id}')" class="p-2 text-zinc-300 hover:text-black transition-colors"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="square" stroke-linejoin="miter" d="M6 18L18 6M6 6l12 12" /></svg></div>`;
                presetsList.appendChild(card);
            });
        }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(()=>{}); }); }
    </script>
</body>
</html>
