<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZeroPhone</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fafafa">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'SimSun', 'Songti SC', 'STSong', serif; }
        input:focus, textarea:focus { outline: 1px dashed #d4d4d8; outline-offset: -1px; border-radius: 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen flex items-center justify-center font-sans overflow-hidden">
    
    <!-- ✨ 主屏幕容器：加入了退场动画的初始状态 (scale-100 opacity-100) ✨ -->
    <div id="phone-screen" class="w-full h-[100dvh] max-w-[430px] sm:w-[390px] sm:h-[844px] bg-zinc-50 sm:rounded-[3rem] shadow-2xl relative overflow-hidden p-6 flex flex-col box-border transition-all duration-300 ease-out transform scale-100 opacity-100">
        
        <div class="bg-white border border-zinc-200 rounded-[24px] p-5 grid grid-cols-2 gap-5 shadow-sm min-h-[180px] box-border w-full">
            <div class="flex flex-col h-full min-w-0 justify-between">
                <div>
                    <input id="app-title" onchange="saveText('app-title')" value="ZeroPhone" class="text-base font-extrabold text-black bg-transparent w-full mb-0 truncate outline-none tracking-widest" />
                    <input id="app-subtitle" onchange="saveText('app-subtitle')" value="Your Personal AI Assistant" class="text-[9px] text-zinc-500 bg-transparent w-full mb-2 truncate outline-none" />
                </div>
                <div class="bg-zinc-50 border border-zinc-100 rounded-[12px] p-2 flex-1 flex flex-col justify-center min-h-0">
                    <div id="calendar-container" class="grid grid-cols-7 gap-y-[2px] w-full mt-0.5"></div>
                </div>
            </div>
            <div class="flex flex-col h-full relative min-w-0 justify-between">
                <div class="absolute -top-1 right-0 text-lg font-light text-black">24°C</div>
                <textarea id="app-greeting" onchange="saveText('app-greeting')" class="mt-6 text-[10px] text-center text-zinc-600 bg-transparent resize-none no-scrollbar outline-none w-full leading-snug font-bold" rows="2">Good Morning!&#10;Ready to explore?</textarea>
                <div class="flex flex-col gap-1.5 w-full">
                    <div class="bg-zinc-50 border border-zinc-100 rounded-[10px] py-1.5 px-2 flex flex-col items-center justify-center text-[9px] font-bold text-black text-center w-full leading-tight min-h-[38px]">
                        <span>Today is Wednesday,</span><span>March 18, 2026</span>
                    </div>
                    <div class="bg-zinc-50 border border-zinc-100 rounded-[10px] py-1.5 px-2 flex items-center justify-center text-[9.5px] font-bold text-black text-center w-full leading-tight min-h-[38px]">
                        The sun will set at 3:34 PM
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-10 flex gap-4 h-40 relative">
            <div class="w-1/2 relative flex items-center justify-center">
                <input type="file" accept="image/*" id="fileInput1" class="hidden" onchange="handleFileUpload(event, 'photo1')" />
                <input type="file" accept="image/*" id="fileInput2" class="hidden" onchange="handleFileUpload(event, 'photo2')" />
                <div id="polaroid-1" onclick="swapPolaroids()" class="absolute bg-white p-2 pb-8 rounded-sm shadow-md transform -rotate-6 transition-all duration-300 hover:scale-105 cursor-pointer w-28 h-32 left-2 top-2 border border-zinc-200 z-0">
                    <img id="photo1" onclick="handlePhotoClick(event, 'photo1', 'fileInput1')" src="https://images.unsplash.com/photo-1707343843437-caacff5cfa74?q=80&w=200&auto=format&fit=crop" class="w-full h-full object-cover bg-zinc-100 hover:opacity-80 transition-opacity" title="点击更换图片" alt="polaroid-1" />
                </div>
                <div id="polaroid-2" onclick="swapPolaroids()" class="absolute bg-white p-2 pb-8 rounded-sm shadow-lg transform rotate-6 transition-all duration-300 hover:scale-105 cursor-pointer w-28 h-32 right-2 top-6 border border-zinc-200 z-10">
                    <img id="photo2" onclick="handlePhotoClick(event, 'photo2', 'fileInput2')" src="https://images.unsplash.com/photo-1682687982501-1e58b814714c?q=80&w=200&auto=format&fit=crop" class="w-full h-full object-cover bg-zinc-100 hover:opacity-80 transition-opacity" title="点击更换图片" alt="polaroid-2" />
                </div>
            </div>

            <div class="w-1/2 grid grid-cols-2 grid-rows-2 gap-3">
                <div class="flex flex-col items-center justify-center gap-1">
                    <div class="w-12 h-12 bg-white border border-zinc-200 rounded-[14px] shadow-sm flex items-center justify-center text-black"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h3M11 21l5-10 5 10M12.751 15h4.498" /></svg></div><span class="text-[10px] font-bold text-zinc-600">Lingo</span>
                </div>
                <div class="flex flex-col items-center justify-center gap-1">
                    <div class="w-12 h-12 bg-white border border-zinc-200 rounded-[14px] shadow-sm flex items-center justify-center text-black"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg></div><span class="text-[10px] font-bold text-zinc-600">World Book</span>
                </div>
                <div class="flex flex-col items-center justify-center gap-1">
                    <div class="w-12 h-12 bg-white border border-zinc-200 rounded-[14px] shadow-sm flex items-center justify-center text-black"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5" /></svg></div><span class="text-[10px] font-bold text-zinc-600">API</span>
                </div>
                <div class="flex flex-col items-center justify-center gap-1">
                    <div class="w-12 h-12 bg-white border border-zinc-200 rounded-[14px] shadow-sm flex items-center justify-center text-black"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z" /></svg></div><span class="text-[10px] font-bold text-zinc-600">FaceMeet</span>
                </div>
            </div>
        </div>

        <div class="absolute bottom-8 left-6 right-6 h-[72px] bg-white/70 backdrop-blur-xl rounded-[2rem] flex items-center justify-between px-6 shadow-sm border border-white/50">
            <div class="w-12 h-12 bg-white rounded-[14px] shadow-sm flex items-center justify-center text-black border border-zinc-100"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg></div>
            <div class="w-12 h-12 bg-white rounded-[14px] shadow-sm flex items-center justify-center text-black border border-zinc-100"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></div>
            <div class="w-12 h-12 bg-white rounded-[14px] shadow-sm flex items-center justify-center text-black border border-zinc-100"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg></div>
            
            <!-- ✨ 点击齿轮，触发退场动画，并加载分离的设置文件 ✨ -->
            <div onclick="openApp('settings.html')" class="cursor-pointer active:scale-90 transition-transform w-12 h-12 bg-white rounded-[14px] shadow-sm flex items-center justify-center text-black border border-zinc-100">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </div>
        </div>
    </div>

    <script>
        // 1. 日历生成
const calendarContainer = document.getElementById('calendar-container');
let calHtml = '';
['S','M','T','W','T','F','S'].forEach(d => { calHtml += `<div class="text-zinc-400 text-center text-[6px] font-bold mb-0.5">${d}</div>`; });
for(let i=1; i<=31; i++) {
    const isToday = i === 18;
    const textClass = isToday ? 'bg-black text-white rounded-full w-[13px] h-[13px] font-bold flex items-center justify-center text-[7px] shadow-sm' : 'text-zinc-600 flex items-center justify-center text-[7px] font-bold';
    calHtml += `<div class="flex items-center justify-center h-full"><span class="${textClass}">${i}</span></div>`;
}
calendarContainer.innerHTML = calHtml;

// ✨ 2. 核心黑科技：静默预加载 (页面一打开，就偷偷把设置页面藏好) ✨
window.addEventListener('DOMContentLoaded', async () => {
    // 恢复文字和图片记忆
    ['app-title', 'app-subtitle', 'app-greeting'].forEach(id => { const s = localStorage.getItem(id); if(s) document.getElementById(id).value = s; });
    ['photo1', 'photo2'].forEach(id => { const s = localStorage.getItem(id); if(s) document.getElementById(id).src = s; });

    try {
        // 偷偷去获取分离开的设置文件
        const response = await fetch('settings.html');
        const htmlText = await response.text();
        // 提前把它装进空盒子里，藏在屏幕右边！
        const container = document.getElementById('dynamic-app-container');
        container.innerHTML = htmlText;
        container.style.pointerEvents = 'auto'; // 激活点击
    } catch (e) {
        console.log("预加载设置页面失败，宝宝检查一下文件名对不对哦~");
    }
});

function saveText(id) { localStorage.setItem(id, document.getElementById(id).value); }

// ✨ 3. 现在的打开动画，0延迟！不需要等待网络！ ✨
function openApp() {
    const home = document.getElementById('screen-home');
    const app = document.getElementById('injected-app'); // 这是 settings.html 里的那个外壳
    
    // 同步一下名字
    const name = localStorage.getItem('app-title') || 'ZeroPhone';
    if(document.getElementById('display-name')) document.getElementById('display-name').innerText = name;

    // 瞬间触发丝滑滑动，绝不卡顿！
    home.style.transform = 'translateX(-20%) scale(0.95)';
    home.style.opacity = '0.5';
    if(app) app.style.transform = 'translateX(0)';
}

// ✨ 4. 丝滑退出 ✨
function closeApp() {
    const home = document.getElementById('screen-home');
    const app = document.getElementById('injected-app');
    
    home.style.transform = 'translateX(0) scale(1)';
    home.style.opacity = '1';
    if(app) app.style.transform = 'translateX(100%)';
}

// 5. 拍立得逻辑 (保持不变)
function handlePhotoClick(e, img, inp) { e.stopPropagation(); const u = prompt("URL:"); if(u){ document.getElementById(img).src = u; localStorage.setItem(img, u);} else document.getElementById(inp).click(); }
function handleFileUpload(e, img) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = e => { const i = new Image(); i.onload = () => { const c = document.createElement('canvas'); let w = i.width, h = i.height; if(w>600){h=Math.round(h*600/w);w=600;} c.width=w; c.height=h; c.getContext('2d').drawImage(i,0,0,w,h); const b = c.toDataURL('image/jpeg',0.8); document.getElementById(img).src = b; try{localStorage.setItem(img,b);}catch(err){} }; i.src = e.target.result; }; r.readAsDataURL(f); }
function swapPolaroids() { const p1=document.getElementById('polaroid-1'), p2=document.getElementById('polaroid-2'); ['-rotate-6','rotate-6','left-2','right-2','top-2','top-6','z-0','z-10','shadow-md','shadow-lg'].forEach(c=>{p1.classList.toggle(c);p2.classList.toggle(c);}); }
    </script>
</body>
</html>
