<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZeroPhone</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'SimSun', 'Songti SC', 'STSong', serif; }
        input:focus, textarea:focus { outline: 1px dashed #d4d4d8; outline-offset: -1px; border-radius: 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; }
        
        select { 
            appearance: none; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='1.5' stroke-linecap='square' stroke-linejoin='miter'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); 
            background-repeat: no-repeat; background-position: right 0 center; background-size: 1.2em; 
        }
        ::selection { background: #000; color: #fff; }

        .font-modern { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        .font-modern input:focus, .font-modern textarea:focus { outline: none; }
        .font-modern ::selection { background: #18181b; color: #fff; }

        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="bg-zinc-900 min-h-screen flex items-center justify-center overflow-hidden m-0 p-0 relative">
    
    <div id="app-container" class="w-full h-[100dvh] max-w-[430px] sm:w-[390px] sm:h-[844px] bg-white sm:rounded-[3rem] relative overflow-hidden box-border border-0 sm:border-[8px] sm:border-black shadow-2xl">

        <!-- ========================================================= -->
        <!-- 🏠 主屏幕 -->
        <!-- ========================================================= -->
        <div id="screen-home" class="absolute inset-0 bg-zinc-50 flex flex-col p-6 transition-transform duration-[400ms] ease-[cubic-bezier(0.32,0.72,0,1)] w-full h-full z-10 translate-x-0">
            <div class="bg-white border border-zinc-200 rounded-[24px] p-5 grid grid-cols-2 gap-5 shadow-sm min-h-[180px] box-border w-full">
                <div class="flex flex-col h-full min-w-0 justify-between">
                    <div>
                        <input id="app-title" onchange="window.saveText('app-title')" value="ZeroPhone" class="text-base font-extrabold text-black bg-transparent w-full mb-0 truncate outline-none tracking-widest" />
                        <input id="app-subtitle" onchange="window.saveText('app-subtitle')" value="Your Personal AI Assistant" class="text-[9px] text-zinc-500 bg-transparent w-full mb-2 truncate outline-none" />
                    </div>
                    <div class="bg-zinc-50 border border-zinc-100 rounded-[12px] p-2 flex-1 flex flex-col justify-center min-h-0">
                        <div id="calendar-container" class="grid grid-cols-7 gap-y-[2px] w-full mt-0.5"></div>
                    </div>
                </div>
                <div class="flex flex-col h-full relative min-w-0 justify-between">
                    <div class="absolute -top-1 right-0 text-lg font-light text-black">24°C</div>
                    <textarea id="app-greeting" onchange="window.saveText('app-greeting')" class="mt-6 text-[10px] text-center text-zinc-600 bg-transparent resize-none no-scrollbar outline-none w-full leading-snug font-bold" rows="2">Good Morning!&#10;Ready to explore?</textarea>
                    <div class="flex flex-col gap-1.5 w-full">
                        <div class="bg-zinc-50 border border-zinc-100 rounded-[10px] py-1.5 px-2 flex flex-col items-center justify-center text-[9px] font-bold text-black text-center w-full leading-tight min-h-[38px]"><span>Today is Wednesday,</span><span>March 18, 2026</span></div>
                        <div class="bg-zinc-50 border border-zinc-100 rounded-[10px] py-1.5 px-2 flex items-center justify-center text-[9.5px] font-bold text-black text-center w-full leading-tight min-h-[38px]">The sun will set at 3:34 PM</div>
                    </div>
                </div>
            </div>

            <div class="mt-10 flex gap-4 h-40 relative">
                <div class="w-1/2 relative flex items-center justify-center">
                    <input type="file" accept="image/*" id="fileInput1" class="hidden" onchange="window.handleFileUpload(event, 'photo1')" />
                    <input type="file" accept="image/*" id="fileInput2" class="hidden" onchange="window.handleFileUpload(event, 'photo2')" />
                    <div id="polaroid-1" onclick="window.swapPolaroids()" class="absolute bg-white p-2 pb-8 rounded-sm shadow-md transform -rotate-6 transition-all duration-300 hover:scale-105 cursor-pointer w-28 h-32 left-2 top-2 border border-zinc-200 z-0">
                        <img id="photo1" onclick="window.handlePhotoClick(event, 'photo1', 'fileInput1')" src="https://images.unsplash.com/photo-1707343843437-caacff5cfa74?q=80&w=200&auto=format&fit=crop" class="w-full h-full object-cover bg-zinc-100 hover:opacity-80 transition-opacity" />
                    </div>
                    <div id="polaroid-2" onclick="window.swapPolaroids()" class="absolute bg-white p-2 pb-8 rounded-sm shadow-lg transform rotate-6 transition-all duration-300 hover:scale-105 cursor-pointer w-28 h-32 right-2 top-6 border border-zinc-200 z-10">
                        <img id="photo2" onclick="window.handlePhotoClick(event, 'photo2', 'fileInput2')" src="https://images.unsplash.com/photo-1682687982501-1e58b814714c?q=80&w=200&auto=format&fit=crop" class="w-full h-full object-cover bg-zinc-100 hover:opacity-80 transition-opacity" />
                    </div>
                </div>

                <div class="w-1/2 grid grid-cols-2 grid-rows-2 gap-3">
                    <div onclick="window.openApp('screen-chat')" class="flex flex-col items-center justify-center gap-1 cursor-pointer active:scale-95 transition-transform">
                        <div class="w-12 h-12 bg-white border border-zinc-200 rounded-[14px] shadow-sm flex items-center justify-center text-black"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg></div><span class="text-[10px] font-bold text-zinc-600">Lingo</span>
                    </div>
                    <div class="flex flex-col items-center justify-center gap-1">
                        <div class="w-12 h-12 bg-white border border-zinc-200 rounded-[14px] shadow-sm flex items-center justify-center text-black"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg></div><span class="text-[10px] font-bold text-zinc-600">World</span>
                    </div>
                    <div onclick="window.openApp('screen-api')" class="flex flex-col items-center justify-center gap-1 cursor-pointer active:scale-95 transition-transform">
                        <div class="w-12 h-12 bg-white border border-zinc-200 rounded-[14px] shadow-sm flex items-center justify-center text-black"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5" /></svg></div><span class="text-[10px] font-bold text-zinc-600">API</span>
                    </div>
                    <div class="flex flex-col items-center justify-center gap-1">
                        <div class="w-12 h-12 bg-white border border-zinc-200 rounded-[14px] shadow-sm flex items-center justify-center text-black"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z" /></svg></div><span class="text-[10px] font-bold text-zinc-600">Face</span>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-8 left-6 right-6 h-[72px] bg-white/70 backdrop-blur-xl rounded-[2rem] flex items-center justify-between px-6 shadow-sm border border-white/50">
                <div class="w-12 h-12 bg-white rounded-[14px] shadow-sm flex items-center justify-center text-black border border-zinc-100"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg></div>
                <div class="w-12 h-12 bg-white rounded-[14px] shadow-sm flex items-center justify-center text-black border border-zinc-100"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></div>
                <div onclick="window.openApp('screen-chat')" class="cursor-pointer active:scale-90 transition-transform w-12 h-12 bg-white rounded-[14px] shadow-sm flex items-center justify-center text-black border border-zinc-100"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg></div>
                <div onclick="window.openApp('screen-api')" class="cursor-pointer active:scale-90 transition-transform w-12 h-12 bg-white rounded-[14px] shadow-sm flex items-center justify-center text-black border border-zinc-100"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg></div>
            </div>
        </div>

    </div>

    <!-- 核心大脑逻辑 -->
    <script>
        // 全局基础工具和状态共享
        window.memoryStorage = {};
        window.safeSet = function(k, v) { try { localStorage.setItem(k, v); } catch (e) { window.memoryStorage[k] = v; } };
        window.safeGet = function(k) { try { return localStorage.getItem(k); } catch (e) { return window.memoryStorage[k] || null; } };

        window.openApp = function(screenId) {
            document.getElementById('screen-home').style.transform = 'translateX(-20%) scale(0.95)';
            document.getElementById('screen-home').style.opacity = '0.5';
            document.getElementById(screenId).style.transform = 'translateX(0)';
        };
        window.closeApp = function(screenId) {
            document.getElementById('screen-home').style.transform = 'translateX(0) scale(1)';
            document.getElementById('screen-home').style.opacity = '1';
            document.getElementById(screenId).style.transform = 'translateX(100%)';
        };

        // 🏠 桌面业务逻辑
        window.saveText = function(id) { window.safeSet(id, document.getElementById(id).value); };
        window.handlePhotoClick = function(e, img, inp) { e.stopPropagation(); const u = prompt("URL:"); if(u){ document.getElementById(img).src = u; window.safeSet(img, u);} else document.getElementById(inp).click(); };
        window.handleFileUpload = function(e, img) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = ev => { const i = new Image(); i.onload = () => { const c = document.createElement('canvas'); let w=i.width, h=i.height; if(w>600){h=Math.round(h*600/w);w=600;} c.width=w; c.height=h; c.getContext('2d').drawImage(i,0,0,w,h); const b=c.toDataURL('image/jpeg',0.8); document.getElementById(img).src=b; try{window.safeSet(img,b);}catch(err){} }; i.src = ev.target.result; }; r.readAsDataURL(f); };
        window.swapPolaroids = function() { const p1=document.getElementById('polaroid-1'), p2=document.getElementById('polaroid-2'); ['-rotate-6','rotate-6','left-2','right-2','top-2','top-6','z-0','z-10','shadow-md','shadow-lg'].forEach(c=>{p1.classList.toggle(c);p2.classList.toggle(c);}); };

        // 初始化日历和桌面数据
        document.addEventListener('DOMContentLoaded', () => {
            const cal = document.getElementById('calendar-container');
            let h = ''; ['S','M','T','W','T','F','S'].forEach(d => h+=`<div class="text-zinc-400 text-center text-[6px] font-bold mb-0.5">${d}</div>`);
            for(let i=1; i<=31; i++) { 
                const isToday = i === 18;
                const textClass = isToday ? 'bg-black text-white rounded-full w-[13px] h-[13px] font-bold flex items-center justify-center text-[7px] shadow-sm' : 'text-zinc-600 flex items-center justify-center text-[7px] font-bold';
                h+=`<div class="flex items-center justify-center h-full"><span class="${textClass}">${i}</span></div>`; 
            }
            cal.innerHTML = h;

            ['app-title', 'app-subtitle', 'app-greeting'].forEach(id => { const s = window.safeGet(id); if(s !== null) document.getElementById(id).value = s; });
            ['photo1', 'photo2'].forEach(id => { const s = window.safeGet(id); if(s) document.getElementById(id).src = s; });
        });
    </script>

        <!-- 动态引入 API 和 Lingo 模块 -->
    <script src="api.js"></script>
    <script src="lingo.js"></script>
    <script src="lingo-chat.js"></script>  <!-- 增加这一行 -->
</body>
</html>
